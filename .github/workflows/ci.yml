name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.services }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            services:
              - 'services/**'
            admin:
              - 'apps/admin/**'
              - 'packages/turso/**'
              - 'packages/ui/**'
              - 'packages/typescript-config/**'

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go build ./services/orchestrator
      - run: go test ./services/orchestrator

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run lint
      - run: pnpm run check-types

  docker:
    needs: [go, js, changes]
    if: needs.changes.outputs.services == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/orchestrator
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository_owner }}/camaron-orchestrator:latest
      - uses: docker/build-push-action@v6
        with:
          context: services/inference
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository_owner }}/camaron-inference:latest

  deploy-vps:
    needs: [docker, changes]
    if: |
      needs.changes.outputs.services == 'true' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "scripts/deploy.sh,services/docker-compose.prod.yml"
          target: "/opt/camaron"
          strip_components: 1
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cat > /opt/camaron/.env << 'EOF'
            R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_ENDPOINT_URL=${{ secrets.R2_ENDPOINT_URL }}
            TURSO_DATABASE_URL=${{ secrets.TURSO_DATABASE_URL }}
            TURSO_AUTH_TOKEN=${{ secrets.TURSO_AUTH_TOKEN }}
            ORCHESTRATOR_API_KEY=${{ secrets.ORCHESTRATOR_API_KEY }}
            EOF
            chmod +x /opt/camaron/deploy.sh
            bash /opt/camaron/deploy.sh

  deploy-admin:
    needs: [js, changes]
    if: |
      (needs.changes.outputs.admin == 'true' || needs.changes.outputs.services == 'true') &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - name: Set admin env vars
        run: |
          echo "TURSO_DATABASE_URL=${{ secrets.TURSO_DATABASE_URL }}" >> $GITHUB_ENV
          echo "TURSO_AUTH_TOKEN=${{ secrets.TURSO_AUTH_TOKEN }}" >> $GITHUB_ENV
          echo "R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}" >> $GITHUB_ENV
      - name: Build admin for Vercel
        run: cd apps/admin && pnpm build
        env:
          TURSO_DATABASE_URL: ${{ env.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ env.TURSO_AUTH_TOKEN }}
          R2_PUBLIC_URL: ${{ env.R2_PUBLIC_URL }}
      - name: Push runtime env to Vercel
        run: |
          cd apps/admin
          npx vercel env rm TURSO_DATABASE_URL production --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
          echo "${{ env.TURSO_DATABASE_URL }}" | npx vercel env add TURSO_DATABASE_URL production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel env rm TURSO_AUTH_TOKEN production --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
          echo "${{ env.TURSO_AUTH_TOKEN }}" | npx vercel env add TURSO_AUTH_TOKEN production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel env rm R2_PUBLIC_URL production --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
          echo "${{ env.R2_PUBLIC_URL }}" | npx vercel env add R2_PUBLIC_URL production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./apps/admin
