services:
  orchestrator:
    build:
      context: orchestrator
    ports:
      - "8080:8080"
    environment:
      - PORT=8080

  inference:
    build:
      context: inference
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - OUTPUT_DIR=/data/snapshots
      - POLL_INTERVAL=10
      - SAMPLE_INTERVAL=1.0
    volumes:
      - ./data/snapshots:/data/snapshots
    depends_on:
      - orchestrator

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
